    <!DOCTYPE html>
    <html>
    <head>
        <title>每日论文 {{ date }}</title>
        <style>
            .paper { border-bottom: 1px solid #eee; padding: 20px 0; }
            h2 { margin-top: 0; }
            .meta { color: #666; font-size: 0.9em; }
        </style>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-white p-20 text-gray font-sans">
        <h1 class="text-4xl font-bold mb-6">📅 Daily Papers: {{ date }}</h1>

        <div class="grid grid-cols-3 gap-3">
            {% for paper in papers %}
            <div class="paper max-w-3xl bg-white p-6 rounded-lg shadow-xl mb-6">
                <h2 class="text-xl font-semibold"><a href="{{ paper.url }}">{{ paper.title }}</a></h2>
                <div class="meta">📅 {{ paper.published }} | 👥 {{ paper.authors|join(', ') }} | 🏷️ {{ paper.categories|join(', ') }}</div>
                <p>{{ paper.summary }}</p>
            </div>
            {% endfor %}
        </div>

    </body>
    </html>
